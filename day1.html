<html lang="en">

<head>

<body>
    <h1><b>STUDENT REGISTRATION FORM </b></h1>

<h2>Welcome to Shruti website:</h2>
<br><br>
<form>
    <label for="name">Name:
        <input type=" text" id="name"> 
    </label>
    <br><br>
    <label for="phone no"> Phone No:
        <input type="digit" id="phone no">
        <br><br>
    <label for="gender">Gender:
         <label for="gender">male</label>
        <input type="radio" id="male" name="gender" value="Male"> 
    </label>

     <label for="gender">
         <label for="gender">female</label>
        <input type="radio" id="female" name="gender"  value="female"> 
    </label>

    <label for="gender">
        <label for="gender">other</label>
        <input type="radio" id="other" name="gender" value="other">   
    </label>
    <br><br>

    <label for="city">city</label>
    <select name="city" id="city">
        <option value="select city">select city</option>
        <option value="pune">pune</option>
        <option value="satara">satara</option>
        <option value="mumbai">mumbai</option>
    </select>

    <br><br>
    <label for="hobbies">Hobbies:
    <input type="checkbox" value="hobbies">playing
    <input type="checkbox" value="hobbies">dancing
    <input type="checkbox" value="hobbies">reading
    </label>
    <br><br>

    <label for="emal">Email:
        <input type="text" id="email">
    </label>
    <br><br>

  <textarea rows="4" cols="30">NOTE:</textarea>
  <br><br>

    <input type="submit" value="submit">






</form>
